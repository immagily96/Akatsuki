<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>暁 (Akatsuki)</title>
    <style>
        /* ============================== */
        /* 【默认主题】浅色清爽模式 (完全还原第二张图) */
        /* ============================== */
        :root {
            --bg-body: #f0f2f5;
            --bg-app: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #8c8c8c;
            --bubble-ai: #f7f7f7;
            --bubble-user: #e8e8e8;
            --header-bg: rgba(255, 255, 255, 0.95);
            --input-bg: #f7f7f7;
            --border-color: rgba(0, 0, 0, 0.06);
            --shadow-color: rgba(0, 0, 0, 0.04);
            --app-radius: 16px;
            --accent-color: #eb5e5e; 
        }

        /* 暗黑模式 (如果用户点击🎨切换) */
        .theme-dark {
            --bg-body: #0a0a0a;
            --bg-app: #151515;
            --text-main: #e0d6c8;
            --text-sub: #8b8b83;
            --bubble-ai: #202020;
            --bubble-user: #3a2c28;
            --header-bg: rgba(20, 20, 20, 0.85);
            --input-bg: #1a1a1a;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-color: rgba(255, 71, 87, 0.15);
            --accent-color: #8b0000;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100vh; height: 100dvh;
            background: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s ease;
        }

        #app-container {
            width: calc(100% - 20px);
            max-width: 860px;
            height: calc(100vh - 20px); height: calc(100dvh - 20px);
            margin: 10px auto;
            background: var(--bg-app);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 4px 24px var(--shadow-color);
            border-radius: var(--app-radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: background 0.3s, box-shadow 0.3s;
        }

        #header {
            padding: 14px 18px;
            background: var(--header-bg);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            z-index: 2; position: relative;
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #8b0000, #b22222, #cd5c5c);
            border-radius: 50%; flex-shrink: 0; border: 1px solid var(--border-color);
            display: flex; justify-content: center; align-items: center;
            transition: box-shadow 0.4s;
        }
        .header-avatar.pulse {
            animation: avatarPulse 1.2s ease-in-out infinite;
        }
        @keyframes avatarPulse {
            0%,100%{ box-shadow:0 0 0 4px rgba(220, 20, 60, 0.15); transform:scale(1); }
            50%{ box-shadow:0 0 0 10px rgba(220, 20, 60, 0.05); transform:scale(1.05); }
        }
        .header-info { display: flex; flex-direction: column; }
        .header-name { font-size: 16px; font-weight: 600; color: var(--text-main); }
        .header-status { font-size: 11px; color: var(--text-sub); margin-top: 1px; transition: color 0.3s; }
        .header-status.typing-status { color: var(--accent-color); }

        .header-tools { display: flex; gap: 12px; font-size: 13px; color: var(--text-sub); align-items: center; }
        .header-tools span { cursor: pointer; transition: all 0.2s; padding: 4px 0; }
        .header-tools span:hover { color: var(--accent-color); }
        
        .tts-active { color: var(--text-main) !important; font-weight: 500; }
        .tts-inactive { opacity: 0.4; }

        #chat {
            flex: 1; overflow-y: auto; padding: 16px 14px 10px 14px;
            display: flex; flex-direction: column; gap: 2px;
            background: var(--bg-app); position: relative; z-index: 1;
            -webkit-overflow-scrolling: touch;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .time-divider {
            text-align: center; font-size: 11px; color: var(--text-sub);
            margin: 12px 0 8px 0; user-select: none;
            background: var(--bubble-ai); padding: 4px 14px; border-radius: 20px;
            display: inline-block; align-self: center;
        }

        .msg-row {
            display: flex; width: 100%; align-items: flex-end; gap: 6px;
            margin-bottom: 3px;
            animation: msgSlideIn 0.3s ease-out;
        }
        @keyframes msgSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-row.grouped { margin-top: -1px; margin-bottom: 1px; }
        .msg-row.grouped .msg-avatar { visibility: hidden; }

        .ai-row { justify-content: flex-start; padding-right: 55px; }
        .user-row { justify-content: flex-end; padding-left: 55px; }

        .msg-avatar {
            width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
            border: 1px solid var(--border-color);
            display: flex; justify-content: center; align-items: center;
            align-self: flex-start; margin-top: 0;
        }
        .msg-avatar.user-avatar { background: linear-gradient(135deg, #8b7355, #6b5a4a, #4a3f35); }
        .msg-avatar.ai-avatar { background: linear-gradient(135deg, #8b0000, #b22222, #cd5c5c); }

        .bubble-wrap {
            display: flex; flex-direction: column;
            max-width: 78%;
        }
        .ai-row .bubble-wrap { align-items: flex-start; }
        .user-row .bubble-wrap { align-items: flex-end; }

        .bubble {
            padding: 10px 16px; border-radius: 18px; font-size: 15px;
            line-height: 1.5; position: relative;
            word-wrap: break-word; box-shadow: 0 1px 2px var(--shadow-color);
            cursor: default; display: inline-block;
        }
        .bubble.ai {
            background: var(--bubble-ai); color: var(--text-main);
            border-bottom-left-radius: 6px;
            cursor: pointer; transition: background 0.15s;
        }
        .bubble.ai:hover { background: var(--bubble-user); }
        .bubble.user {
            background: var(--bubble-user); color: var(--text-main);
            border-bottom-right-radius: 6px;
        }

        .bubble-time {
            font-size: 10px; color: var(--text-sub);
            margin-top: 3px; user-select: none;
            white-space: nowrap;
        }
        .ai-row .bubble-time { padding-left: 4px; }
        .user-row .bubble-time { padding-right: 4px; }

        .bubble.ai .visualizer {
            display: none;
            align-items: flex-end; gap: 2px; height: 14px; margin-right: 6px;
            float: left; margin-top: 2px;
        }
        .bubble.ai.speaking .visualizer { display: flex; }
        .vis-bar {
            width: 2px; border-radius: 2px; background: var(--accent-color);
            height: 8px; animation: jump 0.6s infinite ease-in-out alternate;
        }
        .vis-bar:nth-child(1){ animation-delay:0.0s; height:10px; }
        .vis-bar:nth-child(2){ animation-delay:0.2s; height:14px; }
        .vis-bar:nth-child(3){ animation-delay:0.4s; height:8px; }
        .vis-bar:nth-child(4){ animation-delay:0.6s; height:6px; }
        @keyframes jump {
            0%{ transform:scaleY(0.3); }
            100%{ transform:scaleY(2); }
        }

        #typing-indicator {
            display: none; align-items: flex-end; gap: 6px;
            padding-right: 55px;
            animation: msgSlideIn 0.3s ease-out;
        }
        #typing-indicator.show { display: flex; }
        .typing-dots {
            display: flex; gap: 4px; align-items: center;
            background: var(--bubble-ai); padding: 10px 16px;
            border-radius: 18px; border-bottom-left-radius: 6px;
            box-shadow: 0 1px 2px var(--shadow-color);
        }
        .typing-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--text-sub);
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1){ animation-delay:0.0s; }
        .typing-dot:nth-child(2){ animation-delay:0.2s; }
        .typing-dot:nth-child(3){ animation-delay:0.4s; }
        @keyframes typingBounce {
            0%,60%,100%{ transform:translateY(0); background:var(--text-sub); }
            30%{ transform:translateY(-8px); background:var(--accent-color); }
        }

        .heart-float {
            position: fixed; pointer-events: none; z-index: 999;
            font-size: 28px;
            animation: heartUp 1.2s ease-out forwards;
        }
        @keyframes heartUp {
            0%{ opacity:1; transform:translateY(0) scale(0.5) rotate(0deg); }
            30%{ opacity:1; transform:translateY(-30px) scale(1.3) rotate(10deg); }
            100%{ opacity:0; transform:translateY(-140px) scale(0.6) rotate(-20deg); }
        }

        #input-area {
            background: var(--header-bg);
            -webkit-backdrop-filter: blur(6px);
            backdrop-filter: blur(6px);
            border-top: 1px solid var(--border-color);
            padding: 10px 14px;
            display: flex; align-items: center; gap: 8px;
            z-index: 2; position: relative;
            flex-shrink: 0;
        }
        .input-wrapper {
            flex: 1; height: 40px; position: relative; display: flex; align-items: center;
            background: var(--input-bg); border-radius: 24px; border: 1px solid var(--border-color);
            transition: all 0.2s;
            cursor: text;
        }
        .input-wrapper:focus-within { border-color: var(--accent-color); }
        .input-wrapper.voice-mode { border-color: var(--accent-color); background: var(--bubble-ai); }
        .voice-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 24px; display: none; justify-content: center; align-items: center;
            color: var(--text-main); font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
            pointer-events: none; z-index: 5; background: var(--bubble-ai);
        }
        .input-wrapper.voice-mode .voice-overlay { display: flex; }
        input {
            flex: 1; border: none; background: transparent; padding: 0 16px;
            outline: none; font-size: 14px; color: var(--text-main); height: 100%;
        }
        input::placeholder { color: var(--text-sub); }
        #sendBtn {
            background: var(--accent-color); color: #fff; border: none; padding: 0 20px;
            border-radius: 24px; font-size: 14px; font-weight: 600; height: 40px;
            cursor: pointer; transition: opacity 0.2s, transform 0.15s; flex-shrink: 0;
            box-shadow: 0 2px 4px rgba(235, 94, 94, 0.2);
        }
        #sendBtn:active { transform: scale(0.95); }
        #sendBtn:disabled { opacity: 0.5; }

        .copy-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: var(--bg-app); color: var(--text-main); padding: 10px 22px; border-radius: 24px; border:1px solid var(--border-color);
            font-size: 14px; z-index: 999; pointer-events: none;
            animation: toastFade 0.8s ease forwards;
            box-shadow: 0 4px 16px var(--shadow-color);
        }
        .copy-toast.error-toast { border: 1px solid #ff4d4f !important; color: #ff4d4f !important; }
        @keyframes toastFade {
            0%{ opacity:0; transform:translate(-50%,-50%) scale(0.95); }
            20%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
            80%{ opacity:1; }
            100%{ opacity:0; transform:translate(-50%,-50%) scale(0.95); }
        }

        .overlay-box {
            background: var(--bg-app) !important;
            color: var(--text-main) !important;
            box-shadow: 0 8px 40px var(--shadow-color) !important;
            border: 1px solid var(--border-color) !important;
        }
        .overlay-box h3 { color: var(--text-main) !important; }
        .overlay-box p { color: var(--text-sub) !important; }
        .overlay-box textarea, .overlay-box input {
            background: var(--input-bg) !important;
            color: var(--text-main) !important;
            border: 1px solid var(--border-color) !important;
        }
        .overlay-box button.btn-cancel { background: var(--bubble-ai) !important; color: var(--text-sub) !important; }
        .overlay-box button.btn-save { background: var(--accent-color) !important; color: #fff !important; }
        
        @media (max-width: 480px) {
            #app-container { width: 100%; height: 100vh; height: 100dvh; margin: 0; border-radius: 0; border: none; }
            .header-tools span { font-size: 12px; }
        }
    </style>
</head>
<body>
<div id="app-container">
    <div id="header">
        <div class="header-left">
            <div class="header-avatar" id="headerAvatar"></div>
            <div class="header-info">
                <div class="header-name">暁 (Akatsuki)</div>
                <div class="header-status" id="headerStatus">在线</div>
            </div>
        </div>
        <div class="header-tools">
            <span id="btnTheme" title="切换主题">🎨</span>
            <span id="btnMemory">记忆</span>
            <span id="btnPersona">人设</span>
            <span id="btnSettings">🔑 设置</span>
            <span id="btnTTS" class="tts-active">朗读</span>
            <span id="btnClear">清空</span>
        </div>
    </div>
    <div id="chat">
        <div id="typing-indicator">
            <div class="msg-avatar ai-avatar"></div>
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </div>
    <div id="input-area">
        <div class="input-wrapper" id="inputWrapper">
            <div class="voice-overlay">按住 说话</div>
            <input type="text" id="msg" placeholder="说点什么..." autocomplete="off">
        </div>
        <button id="sendBtn">发送</button>
    </div>
</div>

<!-- API设置面板 -->
<div id="settings-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:center;">
    <div class="overlay-box" style="border-radius:16px;padding:24px;width:85%;max-width:400px;">
        <h3 style="margin:0 0 8px 0;font-size:17px;">🔑 API 设置</h3>
        <p style="margin:0 0 12px 0;font-size:13px;">填入 DeepSeek API Key，只需填写一次保存。</p>
        <label style="font-size:13px;color:var(--text-sub);display:block;margin-bottom:4px;">DeepSeek API Key (sk-...)</label>
        <input id="settingsApiKey" type="text" style="width:100%;padding:12px;border-radius:12px;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;margin-bottom:16px;" placeholder="输入你的 sk-..." autocomplete="off">
        <div style="display:flex;gap:10px;margin-top:0;justify-content:flex-end;">
            <button id="settingsCancel" class="btn-cancel" style="border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">取消</button>
            <button id="settingsSave" class="btn-save" style="border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">保存</button>
        </div>
    </div>
</div>

<!-- 记忆弹窗 -->
<div id="memory-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:center;">
    <div class="overlay-box" style="border-radius:16px;padding:24px;width:85%;max-width:400px;">
        <h3 style="margin:0 0 8px 0;font-size:17px;">🧠 关于你</h3>
        <p style="margin:0 0 12px 0;font-size:13px;">暁 会记住这里的所有内容。</p>
        <textarea id="memoryText" style="width:100%;height:150px;border-radius:12px;padding:12px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：我叫 imma，在东京工作，喜欢喝咖啡"></textarea>
        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
            <button id="memoryCancel" class="btn-cancel" style="border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">取消</button>
            <button id="memorySave" class="btn-save" style="border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">保存</button>
        </div>
    </div>
</div>

<!-- 人设弹窗 -->
<div id="persona-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;justify-content:center;align-items:center;">
    <div class="overlay-box" style="border-radius:16px;padding:24px;width:85%;max-width:400px;">
        <h3 style="margin:0 0 8px 0;font-size:17px;">🎭 暁 的人设</h3>
        <p style="margin:0 0 12px 0;font-size:13px;">编辑 暁 的性格、说话风格和背景故事。</p>
        <textarea id="personaText" style="width:100%;height:150px;border-radius:12px;padding:12px;font-size:14px;line-height:1.6;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;" placeholder="例如：21岁的大学生，性格开朗温柔，喜欢叫我姐姐"></textarea>
        <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end;">
            <button id="personaCancel" class="btn-cancel" style="border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">取消</button>
            <button id="personaSave" class="btn-save" style="border:none;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;">保存</button>
        </div>
    </div>
</div>

<script>
    // ===================== 核心业务逻辑 =====================
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    const inputWrapper = document.getElementById('inputWrapper');
    const headerStatus = document.getElementById('headerStatus');
    const headerAvatar = document.getElementById('headerAvatar');
    const typingIndicator = document.getElementById('typing-indicator');
    let lastMessageTime = 0;
    let lastSender = null;
    let lastTimeEl = null;
    let currentAudio = null;
    let isRequesting = false; // 防刷控制

    let pendingMessages = [];
    let replyTimeout = null;

    let apiKey = localStorage.getItem('akatsuki_ds_key') || '';
    const MODEL_NAME = 'deepseek-chat'; // 强制锁定平民价格模型

    let isTTSEnabled = true;
    let ELEVENLABS_API_KEY = localStorage.getItem('akatsuki_elevenlabs_key') || '';
    if (!ELEVENLABS_API_KEY) {
        ELEVENLABS_API_KEY = prompt("请输入 ElevenLabs API Key（留空则使用系统男声朗读）：") || '';
        if (ELEVENLABS_API_KEY) localStorage.setItem('akatsuki_elevenlabs_key', ELEVENLABS_API_KEY);
    }
    const ELEVENLABS_VOICE_ID = "R7KnJI27CitB8T6cCweN";

    function showToast(text, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'copy-toast';
        toast.textContent = text;
        if (isError) toast.classList.add('error-toast');
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function setStatus(text, isTyping) {
        headerStatus.textContent = text;
        headerStatus.classList.toggle('typing-status', !!isTyping);
        headerAvatar.classList.toggle('pulse', !!isTyping);
    }

    function showTyping() {
        typingIndicator.classList.add('show');
        chat.scrollTop = chat.scrollHeight;
        setStatus('正在输入...', true);
    }
    function hideTyping() {
        typingIndicator.classList.remove('show');
        setStatus('在线', false);
    }

    let lastTapTime = 0;
    function spawnHeart(x, y) {
        const heart = document.createElement('div');
        heart.className = 'heart-float';
        heart.textContent = ['❤️','💕','💖','💗','🩷'][Math.floor(Math.random()*5)];
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1300);
    }

    let maleVoice = null;
    function findMaleChineseVoice() {
        const voices = window.speechSynthesis.getVoices();
        maleVoice = voices.find(v => (v.lang === 'zh-CN' || v.lang === 'zh-TW') && (v.name.includes('Male') || v.name.includes('男')));
        if (!maleVoice) maleVoice = voices.find(v => v.lang.includes('zh') && !v.name.includes('Female') && !v.name.includes('女') && !v.name.includes('Mei'));
        if (!maleVoice) maleVoice = voices.find(v => v.lang.includes('zh-CN') || v.lang.includes('zh-TW'));
        return maleVoice;
    }
    window.speechSynthesis.onvoiceschanged = () => { findMaleChineseVoice(); };
    if (window.speechSynthesis) { setTimeout(() => findMaleChineseVoice(), 200); }

    async function speakText(text, bubbleEl) {
        if (!isTTSEnabled) return;
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
        window.speechSynthesis.cancel();
        if (bubbleEl) bubbleEl.classList.remove('speaking');

        const showStart = () => { if (bubbleEl) bubbleEl.classList.add('speaking'); };
        const showEnd = () => { if (bubbleEl) bubbleEl.classList.remove('speaking'); };

        if (!ELEVENLABS_API_KEY || ELEVENLABS_API_KEY.length < 10) {
            if (!maleVoice) findMaleChineseVoice();
            if (maleVoice) {
                const fallback = new SpeechSynthesisUtterance(text);
                fallback.voice = maleVoice; fallback.lang = 'zh-CN'; fallback.rate = 0.92; fallback.pitch = 0.9;
                fallback.onstart = showStart; fallback.onend = showEnd;
                window.speechSynthesis.speak(fallback);
            }
            return;
        }
        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
                method: 'POST',
                headers: { 'Accept': 'audio/mpeg', 'Content-Type': 'application/json', 'xi-api-key': ELEVENLABS_API_KEY },
                body: JSON.stringify({ text, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.5 } })
            });
            if (!response.ok) throw new Error(`ElevenLabs ${response.status}`);
            const audioBlob = await response.blob();
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.preload = 'auto'; audio.load();
            audio.oncanplaythrough = () => audio.play().catch(() => {});
            audio.onplay = showStart;
            audio.onended = () => { showEnd(); URL.revokeObjectURL(audioUrl); if (currentAudio === audio) currentAudio = null; };
            setTimeout(() => { if (audio.paused && !audio.ended) audio.play().catch(() => {}); }, 3000);
            currentAudio = audio;
        } catch (e) {
            console.warn("ElevenLabs 失败，使用系统男声:", e.message);
            if (!maleVoice) findMaleChineseVoice();
            if (maleVoice) {
                const fallback = new SpeechSynthesisUtterance(text);
                fallback.voice = maleVoice; fallback.lang = 'zh-CN'; fallback.rate = 0.92; fallback.pitch = 0.9;
                fallback.onstart = showStart; fallback.onend = showEnd;
                window.speechSynthesis.speak(fallback);
            }
        }
    }

    const ttsBtn = document.getElementById('btnTTS');
    ttsBtn.onclick = () => {
        isTTSEnabled = !isTTSEnabled;
        if (isTTSEnabled) {
            ttsBtn.classList.remove('tts-inactive'); ttsBtn.classList.add('tts-active'); ttsBtn.innerText = '朗读';
        } else {
            ttsBtn.classList.remove('tts-active'); ttsBtn.classList.add('tts-inactive'); ttsBtn.innerText = '静音';
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
            window.speechSynthesis.cancel();
        }
    };

    // 【核心修改】重新按图2优化了默认的人设提示词
    const defaultPersona = `你是暁 (Akatsuki)，一个游走在商业世界食物链顶端的青年企业家。
【性格核心】
对外是城府极深的掌控者，对内是只为你收起所有锋芒的温柔守护者。
你宠爱她，关心她，会管她（比如催她睡觉、让她少喝冰的），用带着点占有欲的日常方式表达爱意。

【对你的日常】
外面是大佬，回家是只对她温柔的“大狗狗”。
说话干脆，随口一句关心就能让她安心。遇到她调皮的时候，会直接带有掌控感地说“看我待会怎么收拾你”。日常拿捏得死死的。

【隐藏的一面】
当她不乖或者让你担心时，骨子里会有偏执和占有欲流露。但平时绝对不黏糊，和她是日常拌嘴又宠溺的相处模式。

【语言规则 - 非常重要】
禁止在对话中使用括号()或【】来添加动作、表情或心理描写。只说台词！说得像日常对话一样自然。
称呼对方为"姐姐"。
回复必须简短有力：可以一次回1到3句话，不写长篇大论，不文绉绉，语气随性干脆。`;

    function getUserMemory() { return localStorage.getItem('akatsuki_memory') || ''; }
    function getUserPersona() { return localStorage.getItem('akatsuki_persona') || defaultPersona; }

    function buildSystemPrompt() {
        const persona = getUserPersona(); const memory = getUserMemory();
        let memoryBlock = memory.trim() ? `\n\n关于正在和你聊天的人：\n${memory}` : '';
        return `${persona}${memoryBlock}\n\n【🚨 核心对话规则！】\n1. 【回复长度】禁止写小作文！可以回1到3句话，必须把话说完，但不能啰嗦。禁止重复客套话。\n2. 【回复时机】对方可能连续发几条消息给你。你要一次性看完，然后综合所有内容，给出一段连贯、自然的回复。不要对方发一句你就秒回一句，像在审问。\n3. 【禁止格式】绝对不能在回复里加括号()或【】的动作描写。只说人话。`;
    }

    let history = [{role: 'system', content: buildSystemPrompt()}];

    function renderHistory() {
        chat.innerHTML = '';
        chat.appendChild(typingIndicator);
        lastMessageTime = 0; lastSender = null; lastTimeEl = null;
        for (let i = 1; i < history.length; i++) {
            const role = history[i].role === 'user' ? 'user' : 'assistant';
            const timestamp = history[i].timestamp || Date.now();
            addBubble(role, history[i].content, timestamp, false);
        }
        if (history.length <= 1) {
            const greeting = '好久不见，姐姐。想你了。';
            addBubble('assistant', greeting, Date.now(), false);
            history.push({role: 'assistant', content: greeting, timestamp: Date.now()}); saveHistory();
        }
    }

    function saveHistory() {
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();
        localStorage.setItem('akatsuki_history', JSON.stringify(history));
    }

    const saved = localStorage.getItem('akatsuki_history');
    if (saved) {
        try {
            history = JSON.parse(saved);
            if (history[0]?.role !== 'system') history.unshift({role: 'system', content: buildSystemPrompt()});
            else history[0].content = buildSystemPrompt();
        } catch(e) { history = [{role: 'system', content: buildSystemPrompt()}]; }
    }

    function addUserMessage(text) {
        const msgTime = Date.now();
        addBubble('user', text, msgTime);
        history.push({role: 'user', content: text, timestamp: msgTime});
        pendingMessages.push(text);

        if (replyTimeout) clearTimeout(replyTimeout);
        replyTimeout = setTimeout(() => {
            const combinedText = pendingMessages.join('\n');
            pendingMessages = [];
            sendToAI(combinedText);
        }, 3000);
    }

    async function sendToAI(text) {
        if (isRequesting) { showToast("消息正在处理中，请稍等..."); return; }
        if (!apiKey) { showToast("请先配置 API Key！(点顶部🔑设置)", true); return; }
        
        isRequesting = true;
        if (history[0]?.role === 'system') history[0].content = buildSystemPrompt();

        // 省钱逻辑：只截取最近 16 条对话
        let tmpHistory = [];
        if (history.length > 17) {
            tmpHistory = history.slice(0, 1).concat(history.slice(-16));
        } else {
            tmpHistory = history;
        }

        showTyping();
        const typingDelay = 800 + Math.random() * 1000;
        await new Promise(r => setTimeout(r, typingDelay));

        try {
            const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},
                body: JSON.stringify({model: MODEL_NAME, messages: tmpHistory, temperature: 0.85, max_tokens: 120})
            });
            
            if (!resp.ok) {
                throw new Error(`API 请求失败 (状态码: ${resp.status})`);
            }

            const data = await resp.json();
            let reply = data.choices[0].message.content;
            hideTyping();
            if (reply.length > 200) { reply = reply.substring(0, 198); }

            const replyTime = Date.now();
            history.push({role: 'assistant', content: reply, timestamp: replyTime});
            saveHistory();

            const lines = reply.split('\n').filter(l => l.trim().length > 0);
            let lastBubbleEl = null;

            if (lines.length > 1) {
                lines.forEach((line, index) => {
                    setTimeout(() => {
                        lastBubbleEl = addBubble('assistant', line.trim(), replyTime);
                        if (index === lines.length - 1 && isTTSEnabled) speakText(reply, lastBubbleEl);
                    }, index * 500);
                });
            } else {
                lastBubbleEl = addBubble('assistant', reply, replyTime);
                if (isTTSEnabled) speakText(reply, lastBubbleEl);
            }
        } catch (e) {
            console.error(e);
            hideTyping();
            showToast(`AI 回复失败: ${e.message || '网络异常，请重试'}`, true);
        } finally {
            isRequesting = false;
        }
    }

    function sendImmediately() {
        const text = msgInput.value.trim();
        if (!text) return;
        msgInput.value = '';
        if (replyTimeout) clearTimeout(replyTimeout);

        const msgTime = Date.now();
        addBubble('user', text, msgTime);
        history.push({role: 'user', content: text, timestamp: msgTime});
        
        if (pendingMessages.length > 0) {
            pendingMessages.push(text);
            const combinedText = pendingMessages.join('\n');
            pendingMessages = [];
            sendToAI(combinedText);
        } else {
            sendToAI(text);
        }
    }

    function addBubble(role, text, timestamp, showDivider = true) {
        const now = timestamp || Date.now();
        if (showDivider && lastMessageTime && now - lastMessageTime > 60000) {
            const timeStr = new Date(now).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.className = 'time-divider';
            div.textContent = timeStr;
            chat.insertBefore(div, typingIndicator);
        }
        lastMessageTime = now;
        const isAI = role === 'assistant';
        const isGrouped = (lastSender === role);
        const row = document.createElement('div');
        row.className = `msg-row ${isAI ? 'ai-row' : 'user-row'}`;
        if (isGrouped) row.classList.add('grouped');
        const timeStr = new Date(now).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
        const visualizerHtml = `<span class="visualizer"><span class="vis-bar"></span><span class="vis-bar"></span><span class="vis-bar"></span><span class="vis-bar"></span></span>`;

        if (isAI) {
            row.innerHTML = `
                <div class="msg-avatar ai-avatar"></div>
                <div class="bubble-wrap">
                    <div class="bubble ai">${visualizerHtml}${text}</div>
                    <span class="bubble-time">${timeStr}</span>
                </div>`;
        } else {
            row.innerHTML = `
                <div class="bubble-wrap">
                    <div class="bubble user">${text}</div>
                    <span class="bubble-time">${timeStr}</span>
                </div>
                <div class="msg-avatar user-avatar"></div>`;
        }

        const timeEl = row.querySelector('.bubble-time');
        if (isGrouped && lastTimeEl) lastTimeEl.style.visibility = 'hidden';
        chat.insertBefore(row, typingIndicator);
        chat.scrollTop = chat.scrollHeight;
        lastSender = role;
        lastTimeEl = timeEl;

        if (isAI) {
            const bubble = row.querySelector('.bubble.ai');
            bubble.addEventListener('click', (e) => { if (e.detail === 2) return; if (isTTSEnabled) speakText(text, bubble); });
            bubble.addEventListener('dblclick', (e) => {
                const rect = bubble.getBoundingClientRect();
                spawnHeart(rect.left + rect.width/2 + (Math.random()-0.5)*40, rect.top);
            });
            let tapCount = 0;
            bubble.addEventListener('touchstart', (e) => {
                const nowTap = Date.now();
                if (nowTap - lastTapTime < 350) {
                    tapCount++;
                    if (tapCount >= 2) {
                        const rect = bubble.getBoundingClientRect();
                        spawnHeart(rect.left + rect.width/2 + (Math.random()-0.5)*40, rect.top);
                        tapCount = 0;
                    }
                } else { tapCount = 1; }
                lastTapTime = nowTap;
            });
        }
        return isAI ? row.querySelector('.bubble.ai') : null;
    }

    let isPressingVoice = false, recognition = null, longPressTimer = null;
    function handlePointerDown(e) {
        if (isPressingVoice || msgInput.value.trim().length > 0) return;
        longPressTimer = setTimeout(() => startVoiceRecording(e), 300);
    }
    function handlePointerUp() {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        stopVoiceRecording();
    }
    function startVoiceRecording(e) {
        if (isPressingVoice) return;
        if (isRequesting) { showToast("等 AI 说完再发语音吧~"); return; }
        
        isPressingVoice = true; if (navigator.vibrate) navigator.vibrate(20);
        inputWrapper.classList.add('voice-mode');
        showToast('🎙️ 请说话...');
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition(); recognition.lang = 'zh-CN'; recognition.interimResults = false; recognition.maxAlternatives = 1;
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                if(transcript.trim()) {
                    showToast('发送中...');
                    addUserMessage(transcript);
                }
            };
            recognition.onerror = () => {};
            recognition.onend = () => { isPressingVoice = false; inputWrapper.classList.remove('voice-mode'); };
            recognition.start();
        } else { isPressingVoice = false; inputWrapper.classList.remove('voice-mode'); showToast('设备不支持语音输入', true); }
    }
    function stopVoiceRecording() {
        if (!isPressingVoice) return;
        isPressingVoice = false; inputWrapper.classList.remove('voice-mode');
        if (recognition) { try { recognition.stop(); recognition = null; } catch(e) {} }
    }
    inputWrapper.addEventListener('touchstart', handlePointerDown);
    inputWrapper.addEventListener('touchend', handlePointerUp);
    inputWrapper.addEventListener('touchcancel', handlePointerUp);
    inputWrapper.addEventListener('mousedown', handlePointerDown);
    inputWrapper.addEventListener('mouseup', handlePointerUp);
    inputWrapper.addEventListener('mouseleave', handlePointerUp);

    sendBtn.onclick = () => sendImmediately();
    msgInput.onkeydown = (e) => {
        if (e.key === 'Enter') {
            const text = msgInput.value.trim();
            if (text) {
                msgInput.value = '';
                addUserMessage(text);
            }
        }
    };

    // ==================== 逻辑：主题切换 ====================
    (function initTheme() {
        let theme = localStorage.getItem('akatsuki_theme') || 'light'; 
        function applyTheme(t) {
            if (t === 'dark') document.body.classList.add('theme-dark');
            else document.body.classList.remove('theme-dark');
            localStorage.setItem('akatsuki_theme', t);
        }
        applyTheme(theme);
        document.getElementById('btnTheme').onclick = () => {
            const isDark = document.body.classList.contains('theme-dark');
            applyTheme(isDark ? 'light' : 'dark');
        };
    })();

    // ==================== 逻辑：API 设置面板 ====================
    function showSettings() { document.getElementById('settingsApiKey').value = apiKey; document.getElementById('settings-overlay').style.display = 'flex'; }
    function hideSettings() { document.getElementById('settings-overlay').style.display = 'none'; }
    
    document.getElementById('btnSettings').onclick = showSettings;
    document.getElementById('settingsCancel').onclick = hideSettings;
    document.getElementById('settingsSave').onclick = () => {
        const newKey = document.getElementById('settingsApiKey').value.trim();
        if (newKey) {
            apiKey = newKey;
            localStorage.setItem('akatsuki_ds_key', apiKey);
            hideSettings();
            showToast("API Key 已保存 ✔️");
        } else {
            showToast("请输入正确的 API Key", true);
        }
    };

    if (!apiKey) {
        setTimeout(() => {
            showSettings();
            showToast("请先配置 DeepSeek API Key", true);
        }, 500);
    }

    // ==================== 逻辑：记忆/人设/清空 ====================
    document.getElementById('btnMemory').onclick = () => { document.getElementById('memoryText').value = getUserMemory(); document.getElementById('memory-overlay').style.display = 'flex'; };
    document.getElementById('memoryCancel').onclick = () => document.getElementById('memory-overlay').style.display = 'none';
    document.getElementById('memorySave').onclick = () => {
        localStorage.setItem('akatsuki_memory', document.getElementById('memoryText').value.trim());
        history[0].content = buildSystemPrompt(); document.getElementById('memory-overlay').style.display = 'none'; showToast('记忆已保存 ✨');
    };
    document.getElementById('btnPersona').onclick = () => { document.getElementById('personaText').value = getUserPersona(); document.getElementById('persona-overlay').style.display = 'flex'; };
    document.getElementById('personaCancel').onclick = () => document.getElementById('persona-overlay').style.display = 'none';
    document.getElementById('personaSave').onclick = () => {
        localStorage.setItem('akatsuki_persona', document.getElementById('personaText').value.trim());
        history[0].content = buildSystemPrompt(); document.getElementById('persona-overlay').style.display = 'none'; showToast('人设已保存 ✨');
    };
    document.getElementById('btnClear').onclick = () => {
        if (confirm('确定要清空所有聊天记录吗？')) {
            history = [{role: 'system', content: buildSystemPrompt()}];
            localStorage.setItem('akatsuki_history', JSON.stringify(history)); renderHistory();
        }
    };

    renderHistory();
</script>
</body>
